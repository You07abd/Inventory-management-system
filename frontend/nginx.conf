server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # ── Security headers ───────────────────────────────────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(self), microphone=(), geolocation=()" always;
    # HSTS is terminated/added at Cloudflare + the API; safe to also assert here.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # Content-Security-Policy: 'unsafe-inline' is required by the current Vite build
    # (inline styles). connect-src must include the API origin.
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: https://api.aryx.dev; connect-src 'self' https://api.aryx.dev; style-src 'self' 'unsafe-inline'; script-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache hashed static assets; never cache index.html.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
