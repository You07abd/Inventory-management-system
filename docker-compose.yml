services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: inv_user
      POSTGRES_PASSWORD: inv_pass
      POSTGRES_DB: drone_inventory
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - app_network
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg2://inv_user:inv_pass@db:5432/drone_inventory
      FRONTEND_ORIGIN: https://aryx.dev
    depends_on:
      - db
    networks:
      - app_network
      - coolify
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=Host(`api.aryx.dev`)"
      - "traefik.http.routers.backend.entrypoints=websecure"
      - "traefik.http.routers.backend.tls=true"
      - "traefik.http.routers.backend.tls.certresolver=letsencrypt"
      - "traefik.http.services.backend.loadbalancer.server.port=8000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: https://api.aryx.dev
    depends_on:
      - backend
    networks:
      - app_network
      - coolify
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`aryx.dev`) || Host(`www.aryx.dev`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls=true"
      - "traefik.http.routers.frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"

networks:
  app_network:
  coolify:
    external: true

volumes:
  db_data:
