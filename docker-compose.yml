services:
  db:
    image: postgres:16-alpine
    environment:
      # Set these as secrets in Coolify / a local .env — never hardcode real values.
      POSTGRES_USER: ${POSTGRES_USER:?set POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-drone_inventory}
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - app_network
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-drone_inventory}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-https://aryx.dev}
      ENV: ${ENV:-production}
      SECRET_KEY: ${SECRET_KEY:?set SECRET_KEY}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      COOKIE_SAMESITE: ${COOKIE_SAMESITE:-lax}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-.aryx.dev}
    depends_on:
      - db
    networks:
      - app_network
      - coolify
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=Host(`api.aryx.dev`)"
      - "traefik.http.routers.backend.entrypoints=https"
      - "traefik.http.routers.backend.tls=true"
      - "traefik.http.routers.backend.tls.certresolver=letsencrypt"
      - "traefik.http.services.backend.loadbalancer.server.port=8000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: https://api.aryx.dev
    depends_on:
      - backend
    networks:
      - app_network
      - coolify
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`aryx.dev`) || Host(`www.aryx.dev`)"
      - "traefik.http.routers.frontend.entrypoints=https"
      - "traefik.http.routers.frontend.tls=true"
      - "traefik.http.routers.frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"

networks:
  app_network:
  coolify:
    external: true

volumes:
  db_data:
